<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ACCESS</title>
<style>
body {background:black;color:white;display:flex;justify-content:center;align-items:center;height:100vh;}
input {padding:15px;background:black;border:1px solid #888;color:white;}
</style>
</head>
<body>

<input id="code" placeholder="ACCESS CODE">

<script>
async function check(){
    const code = document.getElementById("code").value;

    const res = await fetch("/access", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({code})
    });

    if(res.ok){
        location.href="/main.html";
    } else {
        alert("코드 틀림");
    }
}

document.addEventListener("keydown", e=>{
    if(e.key==="Enter") check();
});
</script>

</body>
</html>
