<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
    background: #0f1115;
    color: #e5e7eb;
    font-family: Arial;
    margin: 0;
}

/* 상단 바 */
.header {
    background: #181c24;
    padding: 15px;
    font-size: 20px;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* 전체 레이아웃 */
.container {
    display: flex;
    height: calc(100vh - 60px);
}

/* 왼쪽 카테고리 */
.sidebar {
    width: 300px;
    background: #141821;
    padding: 15px;
    overflow-y: auto;
    border-right: 1px solid #222;
}

/* 오른쪽 데이터 */
.main {
    flex: 1;
    padding: 20px;
}

/* 카드 */
.card {
    background: #1b2130;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
}

/* 입력 */
input, select {
    padding: 8px;
    border-radius: 5px;
    border: none;
    outline: none;
    background: #0f1115;
    color: white;
    margin-right: 5px;
}

/* 버튼 */
button {
    padding: 6px 10px;
    border: none;
    border-radius: 5px;
    background: #2563eb;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #1d4ed8;
}

/* 리스트 */
ul {
    list-style: none;
    padding-left: 10px;
}

li {
    margin: 5px 0;
    cursor: pointer;
}

/* 선택 강조 */
.active {
    color: #60a5fa;
    font-weight: bold;
}

/* 팝업 */
.modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
}

.modalBox {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: #1b2130;
    padding: 20px;
    border-radius: 10px;
}
</style>
</head>
<body>

<div class="header">
    <div>관리 시스템</div>
    <div>
        <button onclick="backup()">백업</button>
        <button onclick="restore()">복구</button>
        <button onclick="logout()">로그아웃</button>
    </div>
</div>

<div class="container">

<div class="sidebar">

<div class="card">
<h3>카테고리</h3>
<input id="catName" placeholder="이름">
<select id="parentSelect"></select>
<button onclick="addCategory()">+</button>
</div>

<ul id="tree"></ul>

</div>

<div class="main">

<div class="card">
<h3>데이터 입력</h3>
<input id="dataInput" placeholder="내용">
<button onclick="saveData()">저장</button>
</div>

<div class="card">
<h3>데이터 목록</h3>
<ul id="list"></ul>
</div>

</div>

</div>

<!-- 삭제 -->
<div id="modal" class="modal">
<div class="modalBox">
<p>삭제?</p>
<button onclick="confirmDelete()">삭제</button>
<button onclick="closeModal()">취소</button>
</div>
</div>

<!-- 수정 -->
<div id="editModal" class="modal">
<div class="modalBox">
<input id="editInput">
<br><br>
<button onclick="confirmEdit()">수정</button>
<button onclick="closeEdit()">취소</button>
</div>
</div>

<script>
let categories = [];
let selectedCategory = null;
let deleteId = null;
let editId = null;

async function loadCategories(){
    const res = await fetch("/categories");
    categories = await res.json();
    buildParentSelect();
    buildTree();
}

function buildParentSelect(){
    const s = document.getElementById("parentSelect");
    s.innerHTML='<option value="">최상위</option>';
    categories.forEach(c=>{
        let o=document.createElement("option");
        o.value=c.id;
        o.innerText=c.name;
        s.appendChild(o);
    });
}

function buildTree(){
    const tree=document.getElementById("tree");
    tree.innerHTML="";
    function draw(p,el){
        categories.filter(c=>c.parent_id==p).forEach(c=>{
            let li=document.createElement("li");
            li.innerText=c.name;
            li.onclick=e=>{
                e.stopPropagation();
                selectedCategory=c.id;
                highlight();
                loadData();
            };
            let ul=document.createElement("ul");
            li.appendChild(ul);
            el.appendChild(li);
            draw(c.id,ul);
        });
    }
    draw(null,tree);
}

function highlight(){
    document.querySelectorAll("#tree li").forEach(li=>{
        li.classList.remove("active");
        if(li.innerText.trim()===getName(selectedCategory)) li.classList.add("active");
    });
}

function getName(id){
    let c=categories.find(x=>x.id==id);
    return c?c.name:"";
}

async function addCategory(){
    let name=document.getElementById("catName").value;
    let p=document.getElementById("parentSelect").value;
    await fetch("/categories",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name,parent_id:p||null})});
    document.getElementById("catName").value="";
    loadCategories();
}

async function saveData(){
    let t=document.getElementById("dataInput").value;
    await fetch("/data",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text:t,category_id:selectedCategory})});
    document.getElementById("dataInput").value="";
    loadData();
}

async function loadData(){
    let res=await fetch("/data");
    let d=await res.json();
    let list=document.getElementById("list");
    list.innerHTML="";
    d.filter(x=>!selectedCategory||x.category_id==selectedCategory).forEach(x=>{
        let li=document.createElement("li");
        li.innerText=x.text;

        let e=document.createElement("button");
        e.innerText="수정";
        e.onclick=()=>{
            editId=x.id;
            document.getElementById("editInput").value=x.text;
            document.getElementById("editModal").style.display="block";
        };

        let del=document.createElement("button");
        del.innerText="삭제";
        del.onclick=()=>{
            deleteId=x.id;
            document.getElementById("modal").style.display="block";
        };

        li.appendChild(e);
        li.appendChild(del);
        list.appendChild(li);
    });
}

async function confirmEdit(){
    let t=document.getElementById("editInput").value;
    await fetch("/data/"+editId,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({text:t})});
    closeEdit();
    loadData();
}

function closeEdit(){document.getElementById("editModal").style.display="none";}
function closeModal(){document.getElementById("modal").style.display="none";}

async function confirmDelete(){
    await fetch("/data/"+deleteId,{method:"DELETE"});
    closeModal();
    loadData();
}

function backup(){location.href="/backup";}
async function restore(){await fetch("/restore",{method:"POST"});alert("복구 완료");}
function logout(){location.href="/logout";}

document.getElementById("catName").addEventListener("keypress",e=>{if(e.key==="Enter")addCategory();});
document.getElementById("dataInput").addEventListener("keypress",e=>{if(e.key==="Enter")saveData();});

loadCategories();
loadData();
</script>

</body>
</html>
